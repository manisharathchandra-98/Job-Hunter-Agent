name: Deploy Job Analyzer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short

  # ── Job 2: Detect changed paths ────────────────────────────────────────
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      aggregator:    ${{ steps.filter.outputs.aggregator }}
      resume_coach:  ${{ steps.filter.outputs.resume_coach }}
      lambda_proxy:  ${{ steps.filter.outputs.lambda_proxy }}
      frontend:      ${{ steps.filter.outputs.frontend }}
      stepfunctions: ${{ steps.filter.outputs.stepfunctions }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
      rag:           ${{ steps.filter.outputs.rag }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            aggregator:
              - 'agents/aggregator/**'
            resume_coach:
              - 'agents/resume_coach/**'
              - 'rag/**'
            lambda_proxy:
              - 'api/**'
            frontend:
              - 'frontend/**'
            stepfunctions:
              - 'step_functions/**'
            infrastructure:
              - 'infrastructure/**'
              - 'pyproject.toml'
            rag:
              - 'rag/**'

  # ── Job 3: Deploy Lambda — Aggregator ───────────────────────────────────
  deploy-aggregator:
    name: Deploy Aggregator Lambda
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.aggregator == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package and deploy Aggregator
        run: |
          mkdir -p /tmp/aggregator_pkg
          pip install -r agents/aggregator/requirements.txt \
            -t /tmp/aggregator_pkg/ --quiet 2>/dev/null || true
          cp agents/aggregator/lambda_function.py /tmp/aggregator_pkg/
          cd /tmp/aggregator_pkg
          zip -r /tmp/aggregator.zip . -q
          aws lambda update-function-code \
            --function-name job-analyzer-agent-aggregator \
            --zip-file fileb:///tmp/aggregator.zip
          echo "✅ Aggregator deployed"

  # ── Job 4: Deploy Lambda — Resume Coach (with RAG) ──────────────────────
  deploy-resume-coach:
    name: Deploy Resume Coach Lambda (+ RAG)
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.resume_coach == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package and deploy Resume Coach
        run: |
          mkdir -p /tmp/coach_pkg/rag/knowledge_base
          # Install RAG dependencies
          pip install opensearch-py requests-aws4auth \
            -t /tmp/coach_pkg/ --quiet
          # Copy agent code
          cp agents/resume_coach/resume_coach.py /tmp/coach_pkg/
          # Copy full RAG layer
          cp rag/*.py /tmp/coach_pkg/rag/
          cp rag/knowledge_base/*.py /tmp/coach_pkg/rag/knowledge_base/ 2>/dev/null || true
          touch /tmp/coach_pkg/rag/__init__.py
          touch /tmp/coach_pkg/rag/knowledge_base/__init__.py
          # Zip and deploy
          cd /tmp/coach_pkg
          zip -r /tmp/resume_coach.zip . -q
          aws lambda update-function-code \
            --function-name job-analyzer-agent-resume-coach \
            --zip-file fileb:///tmp/resume_coach.zip
          # Update env vars to activate RAG
          aws lambda update-function-configuration --function-name job-analyzer-agent-resume-coach --environment "Variables={MATCHES_TABLE_NAME=Matches,BEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0,RAG_INDEX_BUCKET=${{ secrets.RAG_INDEX_BUCKET }},RAG_INDEX_KEY=rag/career_index.json,USE_RAG=true}"
          echo "✅ Resume Coach deployed with RAG"

  # ── Job 5: Deploy Lambda — API Proxy ────────────────────────────────────
  deploy-lambda-proxy:
    name: Deploy API Proxy Lambda
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.lambda_proxy == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Package and deploy API Proxy
        run: |
          cd api
          zip -j /tmp/lambda_proxy.zip lambda_proxy.py
          aws lambda update-function-code \
            --function-name job-analyzer-api-proxy \
            --zip-file fileb:///tmp/lambda_proxy.zip
          echo "✅ API Proxy deployed"

  # ── Job 6: Deploy Infrastructure via CDK ────────────────────────────────
  deploy-infrastructure:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.infrastructure == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js (for CDK)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: pip install poetry && poetry install --no-root

      - name: CDK Bootstrap
        working-directory: infrastructure
        run: cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: CDK Deploy all stacks
        working-directory: infrastructure
        run: cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Seed salary data (idempotent)
        run: python scripts/seed_data.py

      - name: Upload CDK outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk-outputs.json
          retention-days: 7

  # ── Job 7: Deploy Frontend ───────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
        run: npm run build

      - name: Sync build output to S3
        run: |
          # Sync all assets with long cache (immutable hashed filenames)
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

          # index.html must never be cached so users always get latest
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache cleared"

  # ── Job 8: Update Step Functions ────────────────────────────────────────
  deploy-stepfunctions:
    name: Update Step Functions
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.stepfunctions == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Update state machine definition
        run: |
          python step_functions/update_sfn.py
          echo "✅ Step Functions updated"

  # ── Job 9: Smoke Test ────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - deploy-aggregator
      - deploy-resume-coach
      - deploy-lambda-proxy
      - deploy-infrastructure
      - deploy-frontend
      - deploy-stepfunctions
    # Run even if some deploy jobs were skipped (only fail on real errors)
    if: |
      always() &&
      !cancelled() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Lambda propagation
        run: sleep 10

      - name: Health check
        env:
          API_URL: ${{ secrets.VITE_API_URL }}
          API_KEY: ${{ secrets.VITE_API_KEY }}
        run: |
          python -c "
          import urllib.request, os, sys
          api_url = os.environ.get('API_URL', '').rstrip('/')
          api_key = os.environ.get('API_KEY', '')
          if not api_url:
              print('No API_URL configured, skipping health check')
              sys.exit(0)
          try:
              req = urllib.request.Request(
                  f'{api_url}/health',
                  headers={'x-api-key': api_key}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'Health check passed: HTTP {r.status}')
          except Exception as e:
              print(f'Health check warning: {e}')
          "
      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment pipeline complete"
          echo "   Commit : ${{ github.sha }}"
          echo "   Branch : ${{ github.ref_name }}"
          echo "   Actor  : ${{ github.actor }}"
          echo "   Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"